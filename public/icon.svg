<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- House body -->
  <rect x="148" y="268" width="216" height="164" rx="16" fill="#ffffff" opacity="0.95"/>

  <!-- Roof -->
  <polygon points="256,108 404,272 108,272" fill="#ffffff" opacity="0.95"/>
  <!-- Roof ridge cap (hides polygon overlap artefact) -->
  <rect x="108" y="264" width="296" height="16" rx="8" fill="#ffffff" opacity="0.95"/>

  <!-- Door -->
  <rect x="222" y="340" width="68" height="92" rx="12" fill="url(#bg)"/>

  <!-- Heart over door -->
  <path d="M256 308 c-2-4-8-14-18-14 c-10 0-16 8-16 16 c0 14 18 26 34 38 c16-12 34-24 34-38 c0-8-6-16-16-16 c-10 0-16 10-18 14 z"
        fill="#ffffff" opacity="0.9"/>
</svg>
